# Unified EMO + EMS benchmark config
# Combines fused_uvm_caching (EMO) with embedding memory stashing (EMS).
# During forward, the EMO cache (lxu_cache_weights) is flushed + freed.
# Before backward, the cache is restored via re-prefetch from UVM,
# and batch_i+1 is prefetched for the next forward.
RunOptions:
  world_size: 2
  num_batches: 10
  num_benchmarks: 1
  num_profiles: 1
  sharding_type: table_wise
  profile_dir: "."
  name: "prefetch_emo_ems"
  memory_snapshot: True
  loglevel: "INFO"
PipelineConfig:
  pipeline: "prefetch-ems"
  kwargs:
    site_fqn: "over.overarch.0"
ModelInputConfig:
  num_float_features: 100
  feature_pooling_avg: 30
ModelSelectionConfig:
  model_name: "test_sparse_nn"
  model_config:
    num_float_features: 100
    submodule_kwargs:
      dense_arch_out_size: 128
      over_arch_out_size: 1024
      over_arch_hidden_layers: 5
      dense_arch_hidden_sizes: [128, 128, 128]
      skip_regroup: true
EmbeddingTablesConfig:
  num_unweighted_features: 30
  num_weighted_features: 40
  embedding_feature_dim: 256
  additional_tables:
    - - name: FP16_table
        embedding_dim: 512
        num_embeddings: 100_000
        feature_names: ["additional_0_0"]
        data_type: FP16
      - name: large_table
        embedding_dim: 512
        num_embeddings: 10_000_000
        feature_names: ["additional_0_1"]
        stash_weights: true
    - []
    - - name: skipped_table
        embedding_dim: 128
        num_embeddings: 100_000
        feature_names: ["additional_2_1"]
PlannerConfig:
  pooling_factors: [30.0]
  additional_constraints:
    large_table:
      compute_kernels: [fused_uvm_caching]
      sharding_types: [row_wise]
      cache_params:
        load_factor: 0.2
        prefetch_pipeline: True
