# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CPU Unit Test CI

on:
  push:
    branches:
      # only run tests on main branch & nightly; release should be triggered manually
      - nightly
      - main
    paths-ignore:
      - "docs/*"
      - "third_party/*"
      - .gitignore
      - "*.md"
      - ".github/workflows/[bcdprv]*.yml"
      - ".github/workflows/unittest_ci.yml"
      - '.github/scripts/*.sh'
      - '.github/scripts/*.py'
  pull_request:
    paths-ignore:
      - "docs/*"
      - "third_party/*"
      - .gitignore
      - "*.md"
      - ".github/workflows/[bcdprv]*.yml"
      - ".github/workflows/unittest_ci.yml"
      - '.github/scripts/*.sh'
      - '.github/scripts/*.py'
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel to use for torch and fbgemm"
        required: true
        type: choice
        options:
          - release
          - nightly
          - test

jobs:
  unittest_ci_cpu:
    strategy:
      fail-fast: false
      matrix:
        os:
          - linux.2xlarge
        python:
          - version: "3.10"
            tag: "py310"
          - version: "3.11"
            tag: "py311"
          - version: "3.12"
            tag: "py312"
          - version: "3.13"
            tag: "py313"
          - version: "3.14"
            tag: "py314"
          - version: "3.14"
            tag: "py314"
            free_threaded: true
        is_pr:
          - ${{ github.event_name == 'pull_request' }}
        exclude:
          - is_pr: true
            python:
              version: "3.10"
          - is_pr: true
            python:
              version: "3.11"
          - is_pr: true
            python:
              version: "3.12"
          - is_pr: true
            python:
              version: "3.13"
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      runner: ${{ matrix.os }}
      timeout: 30
      script: |
        ldd --version
        if [[ "${{ matrix.python.free_threaded }}" == "true" ]]; then
          conda create -y --name build_binary python-freethreading=${{ matrix.python.version }}
        else
          conda create -y --name build_binary python=${{ matrix.python.version }}
        fi
        conda run -n build_binary \
          python -c "import sys; print(f'python GIL enabled: {sys._is_gil_enabled()}') if sys.version >= '3.13' else print('python GIL enabled: true')"
        conda info
        python --version
        conda run -n build_binary python --version
        if [[ "${{ inputs.channel }}" = "release" ]]; then
          index_url=https://download.pytorch.org/whl/cpu
        elif [ -z "${{ inputs.channel }}" ]; then
          index_url=https://download.pytorch.org/whl/nightly/cpu
        else
          index_url=https://download.pytorch.org/whl/${{ inputs.channel }}/cpu
        fi
        echo "index_url: $index_url"
        # For release/test channels, a published fbgemm_gpu release is ABI-locked
        # to a specific torch (fbgemm 1.X is built against torch 2.(X+5)); the
        # latest stable torch can be newer than the latest fbgemm release (e.g.
        # torch 2.12 vs fbgemm 1.6) and crash on import with
        # "fbgemm_gpu_config.so: undefined symbol: ..._ZNR5torch7Library4_defE...".
        # So install fbgemm-gpu first and pin torch to the version matching the
        # fbgemm that actually installed. Nightly stays floating (torch/fbgemm
        # nightlies share a daily cadence; their dev/date versions can't be mapped).
        if [[ "${{ inputs.channel }}" = "release" || "${{ inputs.channel }}" = "test" ]]; then
          conda run -n build_binary \
            pip install fbgemm-gpu --index-url $index_url
          fbgemm_ver=$(conda run -n build_binary pip show fbgemm_gpu | grep Version | cut -d' ' -f2)
          fbgemm_minor=$(echo "$fbgemm_ver" | cut -d'.' -f2)
          compat_torch="2.$((fbgemm_minor + 5))"
          echo "Installed fbgemm_gpu=$fbgemm_ver -> pinning torch==${compat_torch}.*"
          conda run -n build_binary \
            pip install "torch==${compat_torch}.*" --index-url $index_url
        else
          conda run -n build_binary \
            pip install torch --index-url $index_url
          conda run -n build_binary \
            pip install fbgemm-gpu --index-url $index_url
        fi
        conda run -n build_binary \
          python -c "import torch; print(torch.__version__)"
        echo "torch succeeded"
        conda run -n build_binary \
          python -c "import torch.distributed"
        conda run -n build_binary \
          python -c "import fbgemm_gpu; print(fbgemm_gpu.__version__)"
        echo "fbgemm_gpu succeeded"
        conda run -n build_binary \
          pip install -r requirements.txt
        conda run -n build_binary \
          python setup.py bdist_wheel \
          --python-tag=${{ matrix.python.tag }}
        conda run -n build_binary \
          python -c "import torchrec"
        echo "torch.distributed succeeded"
        conda run -n build_binary \
          python -c "import numpy"
        echo "numpy succeeded"
        conda run -n build_binary \
          pip install pytest
        conda run -n build_binary \
          python -m pytest torchrec -v -s -W ignore::pytest.PytestCollectionWarning --continue-on-collection-errors \
        --ignore-glob=**/test_utils/ \
        -k "not _disabled_in_oss_compatibility"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ inputs.repository }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
